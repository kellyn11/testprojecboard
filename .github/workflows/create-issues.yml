name: Create Issues and Sub-Issues from Markdown

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth status

      - name: Create parent issues and sub-issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          FILE="output/stories.md"

          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE"
            exit 1
          fi

          get_issue_number_by_title() {
            local title="$1"
            gh issue list \
              --repo "$REPO" \
              --state all \
              --search "\"$title\" in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$title\") | .number" | head -n 1
          }

          get_issue_id_by_number() {
            local number="$1"
            gh api "repos/$REPO/issues/$number" --jq '.id'
          }

          create_issue() {
            local title="$1"
            local body_file="$2"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/issues" \
              -f title="$title" \
              -F body@"$body_file"
          }

          link_sub_issue() {
            local parent_number="$1"
            local sub_issue_id="$2"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/issues/$parent_number/sub_issues" \
              -f sub_issue_id="$sub_issue_id" >/dev/null
          }

          current_title=""
          current_body=""
          current_subissues=""
          mode="body"

          flush_story() {
            if [ -z "$current_title" ]; then
              return
            fi

            echo "Processing parent issue: $current_title"

            parent_number="$(get_issue_number_by_title "$current_title" || true)"

            body_tmp="$(mktemp)"
            printf "%s\n" "$current_body" > "$body_tmp"

            if [ -z "$parent_number" ]; then
              parent_number="$(
                create_issue "$current_title" "$body_tmp" | jq -r '.number'
              )"
              echo "Created parent issue #$parent_number"
            else
              echo "Parent issue already exists: #$parent_number"
            fi

            rm -f "$body_tmp"

            if [ -n "$current_subissues" ]; then
              while IFS= read -r sub_title; do
                [ -z "$sub_title" ] && continue

                echo "Processing sub-issue: $sub_title"

                sub_number="$(get_issue_number_by_title "$sub_title" || true)"

                sub_body_tmp="$(mktemp)"
                printf "Child of: #%s\n\nCreated automatically from %s\n" "$parent_number" "$current_title" > "$sub_body_tmp"

                if [ -z "$sub_number" ]; then
                  sub_number="$(
                    create_issue "$sub_title" "$sub_body_tmp" | jq -r '.number'
                  )"
                  echo "Created sub-issue #$sub_number"
                else
                  echo "Sub-issue already exists: #$sub_number"
                fi

                rm -f "$sub_body_tmp"

                sub_id="$(get_issue_id_by_number "$sub_number")"

                already_linked="$(gh api "repos/$REPO/issues/$parent_number/sub_issues" --jq '.[].id' 2>/dev/null || true)"
                if echo "$already_linked" | grep -qx "$sub_id"; then
                  echo "Sub-issue already linked"
                else
                  link_sub_issue "$parent_number" "$sub_id"
                  echo "Linked sub-issue #$sub_number -> parent #$parent_number"
                fi
              done <<< "$current_subissues"
            fi

            current_title=""
            current_body=""
            current_subissues=""
            mode="body"
          }

          while IFS= read -r line || [ -n "$line" ]; do
            # remove trailing backslashes and trim carriage returns
            line="${line%\\}"
            line="${line%$'\r'}"

            # heading: "Story 7: Checkout" OR "# Story 7: Checkout"
            if [[ "$line" =~ ^#?[[:space:]]*Story[[:space:]]+[0-9]+:[[:space:]]+ ]]; then
              flush_story
              current_title="$(echo "$line" | sed -E 's/^#?[[:space:]]*Story[[:space:]]+[0-9]+:[[:space:]]+//')"
              mode="body"
              continue
            fi

            # switch into sub-issue mode
            if [[ "$line" =~ ^Sub-Issues: ]]; then
              mode="subissues"
              continue
            fi

            if [[ "$mode" == "body" ]]; then
              current_body+="$line"$'\n'
            else
              # accept -, *, or o bullets
              clean="$(echo "$line" | sed -E 's/^[[:space:]]*[-*o][[:space:]]+//')"
              clean="$(echo "$clean" | sed 's/[[:space:]]*$//')"
              if [ -n "$clean" ]; then
                current_subissues+="$clean"$'\n'
              fi
            fi
          done < "$FILE"

          flush_story
