name: Create Issues from Table Markdown

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth status

      - name: Create issues from markdown table
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          FILE="output/stories.md"

          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE"
            exit 1
          fi

          current_section=""

          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%$'\r'}"
            trimmed="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

            # Capture section headings like "2.1 User Management"
            if [[ "$trimmed" =~ ^[0-9]+\.[0-9]+[[:space:]]+ ]]; then
              current_section="$trimmed"
              echo "Section: $current_section"
              continue
            fi

            # Match markdown table rows:
            # | 1 | As a user... | AC1... |
            if [[ "$trimmed" =~ ^\|[[:space:]]*[0-9]+[[:space:]]*\| ]]; then
              row="$(echo "$trimmed" | sed 's/^|//;s/|$//')"

              sn="$(echo "$row" | cut -d'|' -f1 | xargs)"
              story="$(echo "$row" | cut -d'|' -f2 | xargs)"
              ac="$(echo "$row" | cut -d'|' -f3- | sed 's/^ *//;s/ *$//')"

              # Skip header rows
              if [[ "$sn" == "SN" || "$sn" == "---" || -z "$story" ]]; then
                continue
              fi

              title="US${sn} - $(echo "$story" | sed -E 's/^As an? [^,]+, I want to //; s/ so that .*//; s/\.$//')"

              body=$(cat <<EOF
          **Section:** $current_section

          **User Story**
          $story

          **Acceptance Criteria**
          $ac
          EOF
          )

              existing=$(gh issue list \
                --repo "$REPO" \
                --state all \
                --search "\"US${sn} -\" in:title" \
                --json number,title \
                --jq ".[] | select(.title | startswith(\"US${sn} -\")) | .number" || true)

              if [ -n "$existing" ]; then
                echo "Skipping existing issue: $title"
              else
                echo "Creating issue: $title"
                gh issue create \
                  --repo "$REPO" \
                  --title "$title" \
                  --body "$body"
              fi
            fi
          done < "$FILE"
