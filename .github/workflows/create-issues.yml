name: Create Issues + Add to Project Board

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: gh auth status

      - name: Create Issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: kellyn11
          PROJECT_NUMBER: 2
        run: |
          FILE="output/stories.md"

          if [ ! -f "$FILE" ]; then
            echo "stories.md not found"
            exit 1
          fi

          while IFS= read -r line
          do
            if [[ "$line" =~ ^\|[[:space:]]*[0-9]+[[:space:]]*\| ]]; then

              row=$(echo "$line" | sed 's/^|//;s/|$//')

              sn=$(echo "$row" | cut -d'|' -f1 | xargs)
              story=$(echo "$row" | cut -d'|' -f2 | xargs)
              ac=$(echo "$row" | cut -d'|' -f3 | xargs)

              if [[ "$sn" == "SN" ]]; then
                continue
              fi

              title="US$sn"

             body=$(printf "Story:\n%s\n\nAcceptance Criteria:\n%s\n" "$story" "$ac")

              existing=$(gh issue list \
                --repo "$REPO" \
                --state all \
                --search "$title in:title" \
                --json title \
                --jq '.[].title' || true)

              if [[ "$existing" == *"$title"* ]]; then
                echo "Issue exists: $title"
              else
                issue_url=$(gh issue create \
                  --repo "$REPO" \
                  --title "$title" \
                  --body "$body")

                gh project item-add "$PROJECT_NUMBER" \
                  --owner "$OWNER" \
                  --url "$issue_url" || true
              fi

            fi
          done < "$FILE"
