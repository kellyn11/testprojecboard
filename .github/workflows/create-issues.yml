name: Create Issues from Table Markdown

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth status

      - name: Create issues from stories.md table
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          FILE="output/stories.md"

          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE"
            exit 1
          fi

          current_section=""
          pending_sn=""
          pending_story=""
          pending_ac=""

          flush_row() {
            if [ -z "$pending_sn" ] || [ -z "$pending_story" ]; then
              return
            fi

            title="US${pending_sn}"

            body=$(printf "**Section:** %s\n\n**User Story**\n%s\n\n**Acceptance Criteria**\n%s\n" \
              "$current_section" "$pending_story" "$pending_ac")

            existing=$(gh issue list \
              --repo "$REPO" \
              --state all \
              --search "\"$title\" in:title" \
              --json title \
              --jq ".[] | select(.title == \"$title\") | .title" || true)

            if [ -n "$existing" ]; then
              echo "Skipping existing issue: $title"
            else
              echo "Creating issue: $title"
              gh issue create \
                --repo "$REPO" \
                --title "$title" \
                --body "$body"
            fi

            pending_sn=""
            pending_story=""
            pending_ac=""
          }

          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%$'\r'}"
            trimmed="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

            if [ -z "$trimmed" ]; then
              continue
            fi

            # Capture section like "2.1 User Management"
            if [[ "$trimmed" =~ ^[0-9]+\.[0-9]+[[:space:]]+ ]]; then
              flush_row
              current_section="$trimmed"
              echo "Section: $current_section"
              continue
            fi

            # Skip headers
            if [[ "$trimmed" == "SN" || "$trimmed" == "User Stories" || "$trimmed" == "Acceptance Criteria" ]]; then
              continue
            fi

            # Start of new story row: just a number like 1, 2, 3...
            if [[ "$trimmed" =~ ^[0-9]+$ ]]; then
              flush_row
              pending_sn="$trimmed"
              continue
            fi

            # First non-empty line after SN is the user story
            if [ -n "$pending_sn" ] && [ -z "$pending_story" ]; then
              pending_story="$trimmed"
              continue
            fi

            # Everything after story goes to acceptance criteria
            if [ -n "$pending_sn" ] && [ -n "$pending_story" ]; then
              if [ -z "$pending_ac" ]; then
                pending_ac="$trimmed"
              else
                pending_ac="$pending_ac"$'\n'"$trimmed"
              fi
            fi
          done < "$FILE"

          flush_row
