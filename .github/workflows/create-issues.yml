name: Create Issues from Markdown Table

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth status

      - name: Create Issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          FILE="output/stories.md"

          if [ ! -f "$FILE" ]; then
            echo "Missing stories.md"
            exit 1
          fi

          current_section="General"

          while IFS= read -r line
          do
            # detect section headings
            if [[ "$line" =~ ^##[[:space:]]+(.*)$ ]]; then
              current_section="${BASH_REMATCH[1]}"
              continue
            fi

            # detect markdown table rows
            if [[ "$line" =~ ^\|[[:space:]]*[0-9]+[[:space:]]*\| ]]; then

              row=$(echo "$line" | sed 's/^|//;s/|$//')

              sn=$(echo "$row" | cut -d'|' -f1 | xargs)
              story=$(echo "$row" | cut -d'|' -f2 | xargs)
              ac=$(echo "$row" | cut -d'|' -f3 | xargs)

              if [[ "$sn" == "SN" ]]; then
                continue
              fi

              title="US${sn} - ${story:0:60}"


              body="**Section:** $current_section\n\n**User Story**\n$story\n\n**Acceptance Criteria**\n$ac"

              existing=$(gh issue list \
                --repo "$REPO" \
                --state all \
                --search "$title in:title" \
                --json title \
                --jq '.[].title' || true)

              if [[ "$existing" == *"$title"* ]]; then
                echo "Skipping existing issue: $title"
              else
                echo "Creating issue: $title"

                gh issue create \
                  --repo "$REPO" \
                  --title "$title" \
                  --body "$body"
              fi
            fi

          done < "$FILE"
