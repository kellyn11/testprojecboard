name: Convert DOCX to Markdown

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Check Pandoc
        run: pandoc input/stories.docx -t markdown -o output/stories.md

      - name: Commit output
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add output/stories.md
          git commit -m "Generated markdown" || echo "No changes"
          git push
