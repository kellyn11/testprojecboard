name: Convert DOCX to Markdown

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert DOCX to Markdown
        run: |
          mkdir -p output
          pandoc input/stories.docx -t markdown -o output/stories.md

      - name: Show converted output
        run: |
          echo "=== output/stories.md ==="
          cat output/stories.md || true

      - name: Commit converted markdown
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/stories.md
          git commit -m "Update stories.md from stories.docx" || echo "No changes to commit"
          git push
