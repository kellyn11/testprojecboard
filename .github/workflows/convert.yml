name: Convert DOCX to Markdown

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert DOCX
        run: pandoc input/stories.docx -t markdown -o output/stories.md

      - name: Show output files
        run: ls -R
